<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무룡고 통합 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <nav class="bg-white sticky top-0 z-50 border-b border-slate-200 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-3 flex gap-2 overflow-x-auto hide-scrollbar flex-nowrap">
            <button onclick="switchTab('lunch')" class="tab-btn px-5 py-2.5 rounded-full font-bold bg-slate-900 text-white shrink-0">🍱 급식/공지</button>
            <button onclick="switchTab('facility')" class="tab-btn px-5 py-2.5 rounded-full font-bold bg-slate-100 text-slate-600 shrink-0">🏢 시설예약</button>
            <button onclick="switchTab('umbrella')" class="tab-btn px-5 py-2.5 rounded-full font-bold bg-slate-100 text-slate-600 shrink-0">☂️ 양심우산</button>
            <button onclick="switchTab('board')" class="tab-btn px-5 py-2.5 rounded-full font-bold bg-slate-100 text-slate-600 shrink-0">📋 게시판/요청</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-2">
        <div id="view-lunch" class="tab-content active">
            <div class="p-6 bg-white rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-xl font-black mb-4">🍱 급식 배식 현황 제어</h2>
                <div id="l_status" class="text-3xl font-black text-blue-600 mb-6">배식 전</div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="l_update('next')" class="bg-blue-600 text-white py-3 rounded-xl font-bold">다음 학년</button>
                    <button onclick="l_update('reset')" class="bg-slate-200 text-slate-700 py-3 rounded-xl font-bold">초기화</button>
                </div>
            </div>
        </div>

        <div id="view-facility" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="f_list"></div>
        </div>

        <div id="view-umbrella" class="tab-content">
            <div id="u_list" class="space-y-3"></div>
        </div>

        <div id="view-board" class="tab-content">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-bold mb-4">🔍 새 분실물 등록</h2>
                <input type="text" id="b_name" placeholder="물품명" class="w-full p-3 mb-2 border rounded-xl">
                <input type="file" id="b_img" class="w-full mb-4">
                <button onclick="b_addLostFound()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">등록하기</button>
            </div>
        </div>
    </main>

    <script>
        const db = supabase.createClient('https://svrlvstjrmwrgiemdmfb.supabase.co', 'sb_publishable_sCS-V62jHaxr0wq0BHWkog_VbAcrrix');

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-slate-900', 'text-white');
                b.classList.add('bg-slate-100', 'text-slate-600');
            });
            event.target.classList.replace('bg-slate-100', 'bg-slate-900');
            event.target.classList.replace('text-slate-600', 'text-white');
        }

        async function b_addLostFound() {
            const name = document.getElementById('b_name').value;
            const file = document.getElementById('b_img').files[0];
            let imageUrl = null;

            if (file) {
                const { data, error } = await db.storage.from('lost_found').upload(Date.now() + '.png', file);
                if (error) return alert("사진 업로드 실패: " + error.message);
                imageUrl = db.storage.from('lost_found').getPublicUrl(data.path).data.publicUrl;
            }

            const { error } = await db.from('lost_and_found').insert([{ item_name: name, image_url: imageUrl }]);
            if (error) alert("오류: " + error.message);
            else alert("등록 완료!");
        }

        // 급식 로딩 방어 코드
        async function initLunch() {
            let { data, error } = await db.from('lunch_status').select('*').eq('id', 1).single();
            if(!data) {
                await db.from('lunch_status').insert([{ id: 1, current_index: 0 }]);
                document.getElementById('l_status').innerText = "배식 전";
            } else {
                document.getElementById('l_status').innerText = ["배식 전", "3학년", "2학년", "1학년"][data.current_index] || "배식 종료";
            }
        }

        window.onload = () => { initLunch(); };
    </script>
</body>
</html>
